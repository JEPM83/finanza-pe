<div class="main-wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <button class="btn-hamburger" id="btnMenuOpen">&#9776;</button>
      <h2>Transacciones</h2>
    </div>
    <span id="totalInfo" style="font-size:.68rem;color:var(--text-dim);letter-spacing:.5px"></span>
  </div>

  <div class="content">

    <!-- Filtros -->
    <div class="filters">
      <div class="filter-group">
        <label>Buscar</label>
        <input type="text" id="fBusqueda" placeholder="Descripción o comercio..." style="min-width:160px">
      </div>
      <div class="filter-group">
        <label>Cuenta</label>
        <select id="fCuenta">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Categoría</label>
        <select id="fCategoria">
          <option value="">Todas</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Tipo</label>
        <select id="fTipo">
          <option value="">Todos</option>
          <option value="cargo">Cargo</option>
          <option value="abono">Abono</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Desde</label>
        <input type="date" id="fDesde">
      </div>
      <div class="filter-group">
        <label>Hasta</label>
        <input type="date" id="fHasta">
      </div>
      <div class="filter-group" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <div style="display:flex;gap:6px">
          <button class="btn btn-primary" onclick="buscar()">Filtrar</button>
          <button class="btn btn-secondary" onclick="limpiarFiltros()">Limpiar</button>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Descripción / Comercio</th>
              <th class="hide-mobile">Cuenta</th>
              <th class="hide-mobile">Categoría</th>
              <th>Tipo</th>
              <th style="text-align:right">Monto</th>
              <th class="hide-mobile"></th>
            </tr>
          </thead>
          <tbody id="tbodyTx">
            <tr><td colspan="7"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="paginacion"></div>
    </div>

  </div>
</div>

<!-- Modal cambiar categoría -->
<div class="modal-overlay hidden" id="modalCat">
  <div class="modal">
    <div class="modal-header">
      <h3>Cambiar categoría</h3>
      <button onclick="cerrarModalCat()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text-dim)">&#x2715;</button>
    </div>
    <div class="modal-body">
      <p id="modalCatDesc" style="margin-bottom:12px;font-size:.8rem;color:var(--text-dim)"></p>
      <div class="form-group">
        <label>Categoría</label>
        <select id="modalCatSelect"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModalCat()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarCategoria()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/static/js/app.js"></script>
<script src="/static/js/transacciones.js"></script>
</body>
</html>
