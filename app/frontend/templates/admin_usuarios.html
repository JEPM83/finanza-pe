<div class="main-wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <button class="btn-hamburger" id="btnMenuOpen">&#9776;</button>
      <h2>Usuarios</h2>
    </div>
    <button class="btn btn-primary btn-sm" onclick="abrirModalNuevo()">[ + ] Nuevo usuario</button>
  </div>
  <div class="content">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Estado</th>
              <th>Creado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyUsuarios">
            <tr><td colspan="4"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal nuevo usuario -->
<div class="modal-overlay hidden" id="modalNuevo">
  <div class="modal">
    <div class="modal-header">
      <h3>Nuevo usuario</h3>
      <button onclick="cerrarModalNuevo()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text-dim)">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="fUsername" placeholder="ej: julian">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="fPassword" placeholder="••••••">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModalNuevo()">Cancelar</button>
      <button class="btn btn-primary" onclick="crearUsuario()">Crear</button>
    </div>
  </div>
</div>

<!-- Modal reset password -->
<div class="modal-overlay hidden" id="modalPass">
  <div class="modal">
    <div class="modal-header">
      <h3>Resetear contraseña</h3>
      <button onclick="cerrarModalPass()" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--text-dim)">&#x2715;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="passUserId">
      <p style="margin-bottom:1rem;color:var(--text-dim);font-size:.85rem">Usuario: <span id="passUsername" style="color:var(--cyan)"></span></p>
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" id="fNewPass" placeholder="••••••">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="cerrarModalPass()">Cancelar</button>
      <button class="btn btn-primary" onclick="resetearPass()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="/static/js/app.js"></script>
<script src="/static/js/admin_usuarios.js"></script>
</body>
</html>
