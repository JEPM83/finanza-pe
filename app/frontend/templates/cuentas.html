<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[ FINANZA.PE ] :: CUENTAS</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<nav class="sidebar">
  <div class="sidebar-brand">
    <div>
      <h1>// FINANZA.PE</h1>
      <div class="subtitle">&gt;&gt;&gt; financial_monitor v0.1</div>
    </div>
    <button class="sidebar-close" id="btnMenuClose">&#x2715;</button>
  </div>
  <div class="nav-section">
    <div class="nav-label">&gt; sistema</div>
    <a href="/" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/transacciones" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Transacciones
    </a>
    <a href="/cuentas" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Cuentas
    </a>
    <a href="/reportes" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reportes
    </a>
  </div>
  <div class="nav-section">
    <div class="nav-label">&gt; cuenta</div>
    <a href="/cambiar-clave" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Cambiar clave
    </a>
    <a href="/logout" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Cerrar sesión
    </a>
  </div>
</nav>

<div class="main-wrap">
  <div class="topbar">
    <div style="display:flex;align-items:center">
      <button class="btn-hamburger" id="btnMenuOpen">&#9776;</button>
      <h2>Cuentas</h2>
    </div>
    <span style="font-size:.65rem;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase">Saldos calculados desde transacciones</span>
  </div>

  <div class="content">

    <!-- Resumen total -->
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card balance">
        <div class="stat-label">Total Soles (PEN)</div>
        <div class="stat-value" id="totalPEN">—</div>
        <div class="stat-sub">cuentas en PEN</div>
      </div>
      <div class="stat-card neutral">
        <div class="stat-label">Total Dólares (USD)</div>
        <div class="stat-value" id="totalUSD">—</div>
        <div class="stat-sub">cuentas en USD</div>
      </div>
      <div class="stat-card expense">
        <div class="stat-label">Deuda tarjetas (PEN)</div>
        <div class="stat-value" id="totalDeuda">—</div>
        <div class="stat-sub">tarjetas de crédito</div>
      </div>
    </div>

    <!-- Cards de cuentas -->
    <div class="accounts-grid" id="accountsGrid">
      <div style="grid-column:1/-1"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/cuentas.js"></script>
</body>
</html>
