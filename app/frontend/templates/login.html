<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[ FINANZA.PE ] :: LOGIN</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
    }
    .login-brand { text-align:center; margin-bottom:2rem; }
    .login-brand h1 { font-size:1.4rem; color:var(--cyan); margin:0; }
    .login-brand .subtitle { font-size:.7rem; color:var(--text-dim); margin-top:4px; }
    .error-msg {
      background: rgba(255,45,107,.12);
      border: 1px solid var(--red);
      color: var(--red);
      padding: .6rem 1rem;
      border-radius: 6px;
      font-size: .82rem;
      margin-bottom: 1rem;
    }
    .btn-login { width:100%; margin-top:.5rem; padding:.7rem; font-size:.95rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <h1>// FINANZA.PE</h1>
      <div class="subtitle">&gt;&gt;&gt; financial_monitor v0.1</div>
    </div>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" placeholder="admin" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" placeholder="••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-login">Ingresar</button>
    </form>
  </div>
</body>
</html>
